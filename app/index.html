<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#da1a31" />
  <meta name="description" content="Quick-access ED reference: paediatric guidelines by presenting complaint plus adult toxicology, retrieval infusions and intubation checklists. Navigation aid only." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ED guidelines" />
  <title>ED handy-guideline app</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon-192.png" sizes="192x192" type="image/png" />
  <link rel="icon" href="icon-512.png" sizes="512x512" type="image/png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

  <header class="app-header">
    <div class="app-header__row">
      <button id="back-btn" class="app-header__back" aria-label="Back" type="button">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 6l-6 6 6 6"/>
        </svg>
      </button>
      <h1 id="header-title" class="app-header__title">Guidelines</h1>
      <a id="calc-link" class="app-header__calc" href="#/calc" aria-label="Calculators">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="4" y="3" width="16" height="18" rx="2"/>
          <path d="M8 7h8M8 11h2M12 11h2M16 11h0.01M8 15h2M12 15h2M16 15h0.01M8 19h2M12 19h2M16 19h0.01"/>
        </svg>
        <span>Calc</span>
      </a>
    </div>

    <div id="search-wrap" class="app-header__search search">
      <span class="search__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
        </svg>
      </span>
      <input id="search-input" type="search" inputmode="search" autocomplete="off"
             enterkeyhint="search"
             placeholder="Search symptom, drug or condition" aria-label="Search guidelines" />
      <button id="search-clear" class="search__clear" type="button" aria-label="Clear search">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
    </div>

  </header>

  <main id="app" role="main" aria-live="polite">
    <p class="empty-state">Loading guidelines&hellip;</p>
  </main>

  <footer class="app-footer">
    Child guidelines sourced live from <a href="https://www.rch.org.au/clinicalguide/" target="_blank" rel="noopener noreferrer">rch.org.au</a>;
    adult toxicology from <a href="https://www.austin.org.au/clinical-toxicology-guidelines/" target="_blank" rel="noopener noreferrer">austin.org.au</a>.
    Guideline text is never cached locally; tap an entry to open the publisher's page.
  </footer>

  <script src="assets/icons.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
